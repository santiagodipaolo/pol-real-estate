name: Scraping Pipeline

on:
  schedule:
    # Every 6 hours: 00:00, 06:00, 12:00, 18:00 UTC
    - cron: "0 0,6,12,18 * * *"
  workflow_dispatch:
    inputs:
      max_pages:
        description: "Max pages to scrape per operation"
        default: "10"
        type: string
      retrain:
        description: "Retrain models after scraping"
        default: true
        type: boolean

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger pipeline
        run: |
          MAX_PAGES="${{ inputs.max_pages || '10' }}"
          RETRAIN="${{ inputs.retrain || 'true' }}"

          echo "Triggering pipeline: max_pages=$MAX_PAGES retrain=$RETRAIN"

          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "${{ secrets.BACKEND_URL }}/api/v1/admin/pipeline?max_pages=$MAX_PAGES&retrain=$RETRAIN" \
            -H "X-Admin-Key: ${{ secrets.ADMIN_API_KEY }}" \
            -H "Content-Type: application/json")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          echo "Response ($HTTP_CODE): $BODY"

          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "Pipeline trigger failed with HTTP $HTTP_CODE"
            exit 1
          fi

      - name: Wait for pipeline to run
        run: sleep 120

      - name: Check pipeline status
        run: |
          RESPONSE=$(curl -s -X GET \
            "${{ secrets.BACKEND_URL }}/api/v1/admin/status" \
            -H "X-Admin-Key: ${{ secrets.ADMIN_API_KEY }}")

          echo "Pipeline status: $RESPONSE"

          # Check if pipeline failed
          if echo "$RESPONSE" | grep -q '"status":"failed"'; then
            echo "Pipeline reported failure"
            exit 1
          fi
